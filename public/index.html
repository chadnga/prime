<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimeLooks | Control Room</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">&#128128;</span>
          <span class="logo-text">PrimeLooks</span>
        </div>
      </div>
      <nav class="nav">
        <a href="#" class="nav-item active" data-page="overview">
          <span class="nav-icon">&#128202;</span>
          <span>Overview</span>
        </a>
        <a href="#" class="nav-item" data-page="features">
          <span class="nav-icon">&#10024;</span>
          <span>Features</span>
        </a>
        <a href="#" class="nav-item" data-page="moderation">
          <span class="nav-icon">&#128737;</span>
          <span>Moderation</span>
        </a>
        <a href="#" class="nav-item" data-page="xp">
          <span class="nav-icon">&#11088;</span>
          <span>XP & Leaderboard</span>
        </a>
        <a href="#" class="nav-item" data-page="settings">
          <span class="nav-icon">&#9881;</span>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot"></span>
          <span>Connecting...</span>
        </div>
      </div>
    </aside>
    <main class="main">
      <header class="header">
        <h1 class="page-title" id="pageTitle">Overview</h1>
        <div class="header-actions">
          <select id="guildSelect" class="guild-select">
            <option value="">Select server...</option>
          </select>
        </div>
      </header>
      <div class="content" id="content">
        <div class="loading" id="loading">Loading...</div>
        <div class="page-content" id="pageContent" style="display:none;"></div>
      </div>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
